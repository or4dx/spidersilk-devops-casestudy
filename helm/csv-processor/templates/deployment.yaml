apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "csv-processor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "csv-processor.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  # Omitted when autoscaling is enabled - HPA owns the replica count.
  # Including replicas here when HPA is active causes Helm upgrades to fight
  # the HPA's scaling decisions on every helm upgrade.
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "csv-processor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "csv-processor.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "csv-processor.fullname" . }}

      # ── Init container ────────────────────────────────────────────────────
      # Runs before main containers start. Copies /static/ from the app image
      # into the shared emptyDir so nginx can serve static assets.
      initContainers:
        - name: copy-static
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "cp -r /static/. /shared/static/"]
          volumeMounts:
            - name: static-files
              mountPath: /shared/static
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      containers:
        # ── App container ──────────────────────────────────────────────────
        - name: csv-processor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port | int }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "csv-processor.fullname" . }}-config
          volumeMounts:
            - name: static-files
              mountPath: /shared/static
          resources:
            {{- toYaml .Values.resources.app | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        # ── Nginx sidecar ──────────────────────────────────────────────────
        # Serves /static/ from the shared emptyDir; proxies everything else
        # to the Go app on localhost:{{ .Values.config.port }}.
        # nginxinc/nginx-unprivileged pre-creates /var/cache/nginx owned by
        # uid 101 at image build time, so no runtime chown is needed and all
        # capabilities can be dropped.
        - name: nginx
          image: {{ .Values.nginx.image | quote }}
          imagePullPolicy: {{ .Values.nginx.pullPolicy }}
          ports:
            - name: http-nginx
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: static-files
              mountPath: /shared/static
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      # ── Volumes ────────────────────────────────────────────────────────────
      volumes:
        # Shared between init container (write) and nginx sidecar (read-only).
        # emptyDir is ephemeral - tied to the pod lifecycle, no PV needed.
        - name: static-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "csv-processor.fullname" . }}-nginx-config
