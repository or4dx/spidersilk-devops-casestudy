{{- if .Values.autoscaling.enabled }}
# Requires metrics-server to be installed in the cluster.
# Install: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# Verify:  kubectl top pods -n {{ .Release.Namespace }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "csv-processor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "csv-processor.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "csv-processor.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    # Memory as secondary metric: CSV parsing buffers entire files in memory,
    # so a large upload can spike RSS without affecting CPU.
    # Requires memory limits to be set on the app container (they are).
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
