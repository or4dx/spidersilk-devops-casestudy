apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "csv-processor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "csv-processor.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.irsaRoleArn }}
  annotations:
    # IRSA: the KOPS cluster's OIDC provider validates this token and allows
    # the pod to assume the named IAM role without static credentials.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.irsaRoleArn | quote }}
  {{- end }}
