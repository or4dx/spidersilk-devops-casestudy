apiVersion: v1
kind: Secret
metadata:
  name: {{ include "csv-processor.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "csv-processor.labels" . | nindent 4 }}
  annotations:
    # In production, AWS credentials are not stored here — IRSA handles S3
    # access via the ServiceAccount OIDC annotation (no static keys required).
    #
    # For non-IRSA environments (e.g. local dev, CI without OIDC), add:
    #   AWS_ACCESS_KEY_ID:     <base64-encoded>
    #   AWS_SECRET_ACCESS_KEY: <base64-encoded>
    # and reference them in the Deployment's env block. Manage the values via
    # ansible-vault in all.vault.yaml — never commit plaintext credentials.
type: Opaque
data: {}
